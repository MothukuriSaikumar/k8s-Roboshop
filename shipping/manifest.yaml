apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping
  namespace: roboshop 
  labels:
    project: roboshop
    environment: dev
    component: shipping
    tier: backend
data:
   CART_ENDPOINT: "cart:8080"
   DB_HOST: "mysql"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    component: shipping
    tier: backend
spec:
  selector:
   # these labels are used to select pods
    matchLabels:
      component: shipping
  replicas: 1
  template:
    metadata:
    # these labels are used to identify pods
      labels:
        component: shipping
    spec:
      containers:
      - name: catalogue
        image: saikumar19/catalogue:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: catalogue
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet: 
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15 
      
---
apiVersion: v1
kind: Service
metadata:
  
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    component: shipping
    tier: backend
spec:
  selector: 
    component: shipping  
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
    