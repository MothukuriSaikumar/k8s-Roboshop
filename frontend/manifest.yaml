apiVersion: apps/v1
kind: Deployment  
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    component: frontend
    tier: web
spec:
  selector:
    matchLabels:
      component: frontend 
  replicas: 1
  template: 
    metadata:
      labels:
        component: frontend 
    spec:
      containers:
        - name: frontend
          image: saikumar19/frontend:v1
          imagePullPolicy: Always
          ports:
            - name: liveness-port
              containerPort: 80
          readinessProbe:
            httpGet: 
              path: /
              port: liveness-port
            failureThreshold: 3
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: liveness-port
            failureThreshold: 3
            initialDelaySeconds: 5


---
apiVersion: v1
kind: Service
Metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    component: frontend
    tier: web 
spec:
  type: loadBalancer
  selector:
    project: roboshop
    component: frontend 
    tier: web  
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

          
          
          

        