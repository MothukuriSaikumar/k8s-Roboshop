apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    component: mysql
    tier: database
spec:
  selector:
    matchLabels:
      component: mysql
  replicas: 1
  template:
    metadata:
      labels:
        component: mysql
    spec:
      containers:
      - name: mysql
        image: saikumar19/mysql:v1
        imagePullPolicy: Always
        readinessProbe:
      tcpSocket:
        port: 3306
      initialDelaySeconds: 15
      periodSeconds: 10
    livenessProbe:
      tcpSocket:
        port: 3306
      initialDelaySeconds: 5
      periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    component: mysql
    tier: database
spec:
  selector: 
    component: mysql 
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306
    

  